name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.78'

jobs:
  # ─── Frontend Checks ───
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=default

  content-validation:
    name: Validate Content JSON
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsx ../scripts/validate-content.ts

  # ─── Rust API Checks ───
  rust-check:
    name: Rust Check & Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-api
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo fmt -- --check

  rust-test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-api
      - run: cargo test

  # ─── E2E Tests ───
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-unit, rust-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
        env:
          API_URL: http://localhost:8080
          TURSO_URL: file:./test.db
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Docker Build ───
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend-lint, rust-check]
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -t ra-frontend ./frontend
      - name: Build API image
        run: docker build -t ra-api ./rust-api
