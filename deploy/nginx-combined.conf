server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tferhat.com;

    ssl_certificate     /etc/ssl/cloudflare/tferhat.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/tferhat.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max request body size
    client_max_body_size 256k;

    # --- Redirect root to prodataviz ---
    location = / {
        return 302 /projects/prodataviz/;
    }

    # ============================================================
    #  PRODATAVIZ
    # ============================================================

    # --- Backend API (strip /projects/prodataviz prefix) ---
    location /projects/prodataviz/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Backend docs (under subpath) ---
    location /projects/prodataviz/docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /projects/prodataviz/redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /projects/prodataviz/openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Frontend (Next.js with basePath=/projects/prodataviz) ---
    location /projects/prodataviz/ {
        proxy_pass http://frontend:3000/projects/prodataviz/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================================
    #  REVERSE ACADEMY
    # ============================================================

    # --- Code execution ---
    location /projects/reverse-academy/api/v1/execute {
        proxy_pass http://ra-api:8080/api/v1/execute;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth endpoints ---
    location /projects/reverse-academy/api/v1/auth/ {
        proxy_pass http://ra-api:8080/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Rust API ---
    location /projects/reverse-academy/api/v1/ {
        proxy_pass http://ra-api:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Swagger UI ---
    location /projects/reverse-academy/swagger-ui/ {
        proxy_pass http://ra-api:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Frontend (SvelteKit with base=/projects/reverse-academy) ---
    location /projects/reverse-academy/ {
        proxy_pass http://ra-frontend:3000/projects/reverse-academy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
