server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tferhat.com;

    ssl_certificate     /etc/ssl/cloudflare/tferhat.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/tferhat.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=ra_auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ra_api:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=ra_execute:10m rate=20r/m;

    # Max request body size
    client_max_body_size 256k;

    # --- Rust API (strip /projects/reverse-academy prefix) ---
    location /projects/reverse-academy/api/v1/ {
        limit_req zone=ra_api burst=20 nodelay;
        proxy_pass http://api:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Code execution — stricter rate limit ---
    location /projects/reverse-academy/api/v1/execute {
        limit_req zone=ra_execute burst=5 nodelay;
        client_max_body_size 256k;
        proxy_pass http://api:8080/api/v1/execute;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth endpoints — strict rate limit ---
    location /projects/reverse-academy/api/v1/auth/ {
        limit_req zone=ra_auth burst=3 nodelay;
        proxy_pass http://api:8080/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend (SvelteKit with base=/projects/reverse-academy) ---
    location /projects/reverse-academy/ {
        proxy_pass http://frontend:3000/projects/reverse-academy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Cache static assets ---
    location ~* /projects/reverse-academy/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|wasm)$ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
