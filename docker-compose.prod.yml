# --------------------------------------------------
# docker-compose.prod.yml
# Production compose file — pulls pre-built images
# from GitHub Container Registry instead of building.
# --------------------------------------------------
services:
  api:
    image: ghcr.io/toufik98/reverse-academy-api:${TAG:-latest}
    container_name: ra-api
    restart: unless-stopped
    environment:
      - PORT=8080
      - TURSO_URL=${TURSO_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - PISTON_URL=http://piston:2000
      - FRONTEND_URL=${FRONTEND_URL:-https://tferhat.com}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@reverse.academy}
      - RUST_LOG=reverse_academy_api=info,tower_http=info
    depends_on:
      - piston
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/toufik98/reverse-academy-frontend:${TAG:-latest}
    container_name: ra-frontend
    restart: unless-stopped
    environment:
      - PORT=3000
      - ORIGIN=${FRONTEND_URL:-https://tferhat.com}
      - API_URL=http://api:8080
      - TURSO_URL=${TURSO_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@reverse.academy}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/projects/reverse-academy/"]
      interval: 30s
      timeout: 5s
      retries: 3

  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: ra-piston
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec,size=256M
    environment:
      - PISTON_RUN_TIMEOUT=10000
      - PISTON_COMPILE_TIMEOUT=15000
      - PISTON_OUTPUT_MAX_SIZE=65536
      - PISTON_MAX_PROCESS_COUNT=32
      - PISTON_MEMORY_LIMIT=268435456
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-reverse-academy.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - api
      - frontend

volumes:
  piston-packages:

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "fd00:dead:beef:1::/64"
