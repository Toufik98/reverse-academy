# --------------------------------------------------
# docker-compose.prod.yml
# Production compose file — pulls pre-built images
# from GitHub Container Registry instead of building.
# Joins prodataviz_default network so the existing
# nginx (prodataviz-nginx) can reverse-proxy to these.
# --------------------------------------------------
services:
  api:
    image: ghcr.io/toufik98/reverse-academy-api:${TAG:-latest}
    container_name: ra-api
    restart: unless-stopped
    environment:
      - PORT=8080
      - TURSO_URL=${TURSO_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - PISTON_URL=http://host.docker.internal:2000
      - FRONTEND_URL=${FRONTEND_URL:-https://tferhat.com}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@reverse.academy}
      - RUST_LOG=reverse_academy_api=info,tower_http=info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prodataviz
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/toufik98/reverse-academy-frontend:${TAG:-latest}
    container_name: ra-frontend
    restart: unless-stopped
    environment:
      - PORT=3000
      - ORIGIN=${FRONTEND_URL:-https://tferhat.com}
      - BACKEND_URL=http://ra-api:8080
      - TURSO_URL=${TURSO_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@reverse.academy}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - prodataviz
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/projects/reverse-academy/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  prodataviz:
    external: true
    name: prodataviz_default
