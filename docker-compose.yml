version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - ORIGIN=${FRONTEND_URL:-http://localhost}
      - API_URL=http://api:8080
      - TURSO_URL=${TURSO_URL:-file:./data/local.db}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@reverse.academy}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: ./rust-api
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - TURSO_URL=${TURSO_URL:-file:./data/local.db}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PISTON_URL=http://piston:2000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@reverse.academy}
      - RUST_LOG=reverse_academy_api=info,tower_http=info
    depends_on:
      - piston
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston:latest
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec,size=256M
    environment:
      - PISTON_RUN_TIMEOUT=10000
      - PISTON_COMPILE_TIMEOUT=15000
      - PISTON_OUTPUT_MAX_SIZE=65536
      - PISTON_MAX_PROCESS_COUNT=32
      - PISTON_MEMORY_LIMIT=268435456
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  piston-packages:
